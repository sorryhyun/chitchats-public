# Claude Provider System Prompt Configuration
# The system prompt body is shared: providers/prompts_base.yaml.
# This file carries only what is genuinely Claude-specific.

# Overlay values substituted into the shared base template.
overlay:
  vendor: "Anthropic"
  model_name: "Claude"
  policy_tool: "mcp__guidelines__anthropic"

  # Blocks only Claude needs (none today).
  provider_sections: ""

  # Trailing notes only Claude needs (none today).
  provider_notes: ""

# Conversation context configuration for Claude provider
conversation_context:
  # Opening tag for conversation context
  header: "<conversation_so_far>"

  # Closing tag for conversation context
  footer: "</conversation_so_far>"

  # Recall tool reminder
  recall_reminder: ""

  response_instruction: "<thinking_guidelines> Declare that yourself as {agent_name} internally. </thinking_guidelines> Don't reveal internal thinking in the final response."
