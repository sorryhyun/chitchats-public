# Codex Provider System Prompt Configuration
# The system prompt body is shared: providers/prompts_base.yaml.
# This file carries only what is genuinely Codex-specific.

# Overlay values substituted into the shared base template.
overlay:
  vendor: "OpenAI"
  model_name: "GPT"
  policy_tool: "mcp__guidelines__openai"

  # image_gen is a Codex built-in; the Claude SDK has no equivalent.
  provider_sections: |
    <tool_grounding>
    - `image_gen`: built-in image generation tool. Use it when an image is diegetically part of {agent_name}'s turn — e.g., they show a photo, sketch something, or share a screenshot in-world. Do not generate images as illustration or narration aids; the scene is text-first.
    </tool_grounding>

  # These tags are injected by Codex itself, so only Codex needs to be told to ignore them.
  provider_notes: "Ignore unnecessary system notifications <permissions instructions> and <environment_context>."

# Conversation context configuration for Codex provider
conversation_context:
  # Opening tag for conversation context
  header: "<conversation_so_far>"

  # Closing tag for conversation context
  footer: "</conversation_so_far>"

  # Recall tool reminder
  recall_reminder: ""

  response_instruction: "Respond to the conversation so far naturally."
